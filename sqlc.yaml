version: "2"
sql:
  - engine: "postgresql"
    schema: "apps/api/internal/migrate/migrations"
    queries: "apps/api/internal/db/queries"
    gen:
      go:
        package: "db"
        out: "apps/api/internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
