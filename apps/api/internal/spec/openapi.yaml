openapi: 3.0.3
info:
  title: UFO Hub API
  version: 0.2.1
  license:
    name: BSD-3-Clause
    url: https://opensource.org/license/bsd-3-clause
  description: >
    Preview Hub HTTP API for UFO (Unified Fleet Orchestrator), with no
    compatibility guarantee. Endpoints and payloads may change without notice.
    Three surfaces: auth (public), the tenant/UI surface (cookie session +
    ?fleet=<fleet id>), and the rover surface (per-rover connection token). Source
    of truth for the protocol; maintained by hand alongside the code (generated
    clients are a follow-up).

servers:
  - url: /

security: []

tags:
  - name: auth
    description: Accounts & sessions (public)
  - name: ui
    description: Tenant surface — session cookie + ?fleet=<fleet id>
  - name: rover
    description: Rover surface — per-rover connection token

paths:
  /:
    get:
      tags: [ui]
      operationId: discovery
      summary: Root — points at the RFC 9727 API catalog
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  service: { type: string }
                  api_catalog: { type: string, description: URL of the /.well-known/api-catalog }
  /.well-known/api-catalog:
    get:
      tags: [ui]
      operationId: apiCatalog
      summary: API discovery (RFC 9727) — linkset of the hub's APIs + their spec/health
      responses:
        "200":
          description: OK
          content:
            application/linkset+json:
              schema: { type: object }
  /openapi.yaml:
    get:
      tags: [ui]
      operationId: openapiSpec
      summary: This OpenAPI document (served on the hub origin for service-desc)
      responses:
        "200":
          description: OK
          content:
            application/yaml:
              schema: { type: string }
  /healthz:
    get:
      tags: [ui]
      operationId: healthCheck
      summary: Liveness check
      responses:
        "200": { description: OK }

  /v1/auth/signup:
    post:
      tags: [auth]
      operationId: signup
      summary: Create an account (auto-creates a fleet and membership) and a session
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SignupRequest" }
      responses:
        "201":
          description: Created (sets ufo_session cookie)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }

  /v1/auth/login:
    post:
      tags: [auth]
      operationId: login
      summary: Start a session
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: OK (sets ufo_session cookie)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/auth/logout:
    post:
      tags: [auth]
      operationId: logout
      summary: End the current session
      responses:
        "204": { description: Logged out }

  /v1/me:
    get:
      tags: [ui]
      operationId: me
      summary: The current user
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/fleets:
    get:
      tags: [ui]
      operationId: listFleets
      summary: Fleets the current user belongs to
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Fleet" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [ui]
      operationId: createFleet
      summary: Create a group fleet (invitable/manageable), owned by the caller
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties: { name: { type: string } }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Fleet" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /v1/fleets/{id}:
    patch:
      tags: [ui]
      operationId: updateFleet
      summary: Rename a fleet (owner only)
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties: { name: { type: string } }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Fleet" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [ui]
      operationId: deleteFleet
      summary: Delete a group fleet (owner only; personal fleets can't be deleted)
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
      responses:
        "204": { description: Deleted }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/rovers:
    get:
      tags: [ui]
      operationId: listRovers
      summary: Rovers in a fleet with presence status
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Fleet" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Rover" } }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/rovers/{id}:
    patch:
      tags: [ui]
      operationId: patchRover
      summary: Update a rover's user-managed fields (owner/admin only; auto-tags untouched)
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { $ref: "#/components/parameters/Fleet" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, minLength: 1 }
                tags: { type: array, items: { type: string } }
      responses:
        "204": { description: Updated }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [ui]
      operationId: deleteRover
      summary: Revoke a rover (its connection token stops working)
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { $ref: "#/components/parameters/Fleet" }
      responses:
        "204": { description: Revoked }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/enrollment-codes:
    get:
      tags: [ui]
      operationId: listEnrollmentCodes
      summary: Enrollment codes for a fleet
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Fleet" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/EnrollmentCode" } }
    post:
      tags: [ui]
      operationId: createEnrollmentCode
      summary: Create an enrollment code (1 use by default, up to 1000 uses)
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Fleet" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateEnrollmentCodeRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EnrollmentCode" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /v1/enrollment-codes/{id}:
    delete:
      tags: [ui]
      operationId: deleteEnrollmentCode
      summary: Revoke an enrollment code
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { $ref: "#/components/parameters/Fleet" }
      responses:
        "204": { description: Revoked }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/rover/enroll:
    post:
      tags: [rover]
      operationId: enroll
      summary: Exchange an enrollment code (bearer) for a per-rover connection token
      security: [{ enrollmentCode: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EnrollRequest" }
      responses:
        "201":
          description: Enrolled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EnrollResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/operations:
    post:
      tags: [ui]
      operationId: createOperation
      summary: Create an operation, applying the auto-exec policy
      description: >
        Creates an operation. If the assignee resolves to a pilot (or a crew
        with ≥1 pilot) a run is auto-dispatched and the operation is
        `in_progress`; a human-only (or empty) assignee leaves it in `backlog`.
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Fleet" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateOperationRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Operation" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
    get:
      tags: [ui]
      operationId: listOperations
      summary: One board column, keyset-paginated
      description: >
        With `status`, returns that column newest-first, keyset-paginated by
        `before` (id; 0/omitted = newest) and `limit` (default 50, max 200),
        optionally scoped to a `mission` (0/omitted = all). Without `status`,
        returns a bounded newest page across statuses.
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: "#/components/parameters/Fleet" }
        - { name: status, in: query, schema: { type: string } }
        - { name: mission, in: query, schema: { type: string, format: uuid } }
        - { name: before, in: query, schema: { type: string, format: uuid } }
        - { name: limit, in: query, schema: { type: integer, default: 50, maximum: 200 } }
        - { name: priority, in: query, schema: { type: integer }, description: 0–4 }
        - { name: assignee_kind, in: query, schema: { type: string, enum: [user, pilot, crew] } }
        - { name: assignee, in: query, schema: { type: string, format: uuid }, description: specific user or crew }
        - { name: pilot, in: query, schema: { type: string, pattern: "^[a-z][a-z0-9_-]{0,31}$" }, description: specific pilot kind }
        - { name: creator, in: query, schema: { type: string, format: uuid } }
        - { name: label, in: query, schema: { type: string, format: uuid } }
        - { name: archived, in: query, schema: { type: string, enum: ["1"] }, description: 1 = include archived (default hidden) }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Operation" } }

  /v1/operations/counts:
    get:
      tags: [ui]
      operationId: countOperations
      summary: Per-status operation counts (optionally scoped to a mission + filters)
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: "#/components/parameters/Fleet" }
        - { name: mission, in: query, schema: { type: string, format: uuid } }
        - { name: priority, in: query, schema: { type: integer } }
        - { name: assignee_kind, in: query, schema: { type: string, enum: [user, pilot, crew] } }
        - { name: assignee, in: query, schema: { type: string, format: uuid } }
        - { name: pilot, in: query, schema: { type: string, pattern: "^[a-z][a-z0-9_-]{0,31}$" } }
        - { name: creator, in: query, schema: { type: string, format: uuid } }
        - { name: label, in: query, schema: { type: string, format: uuid } }
        - { name: archived, in: query, schema: { type: string, enum: ["1"] } }
      responses:
        "200":
          description: status → count
          content:
            application/json:
              schema: { type: object, additionalProperties: { type: integer, format: int64 } }

  /v1/operations/working:
    get:
      tags: [ui]
      operationId: workingCount
      summary: Count operations with queued vs claimed/running runs
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Fleet" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer, format: int64, description: queued + working }
                  queued: { type: integer, format: int64 }
                  working: { type: integer, format: int64, description: claimed + starting + running }

  /v1/operations/{id}:
    get:
      tags: [ui]
      operationId: getOperation
      summary: An operation with its comment thread and runs
      security: [{ sessionCookie: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/Fleet" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OperationDetail" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [ui]
      operationId: patchOperation
      summary: Update operation fields
      description: >
        Partial resource update. Assignee changes re-apply auto-dispatch policy:
        a pilot (or crew with a pilot) queues a run, while human-only work
        stays in backlog unless status is explicitly patched.
      security: [{ sessionCookie: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/Fleet" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OperationPatch" }
      responses:
        "200":
          description: Updated operation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Operation" }
        "409": { $ref: "#/components/responses/Conflict" }
        "404": { $ref: "#/components/responses/NotFound" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /v1/operations/{id}/run:
    post:
      tags: [ui]
      operationId: runOperation
      summary: Re-dispatch a run to the operation's assigned pilot
      security: [{ sessionCookie: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/Fleet" }
      responses:
        "202": { description: Run queued }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/operations/{id}/labels/{label_id}:
    put:
      tags: [ui]
      operationId: attachLabel
      summary: Attach a label to an operation
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { name: label_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/Fleet" }
      responses:
        "204": { description: Attached }
    delete:
      tags: [ui]
      operationId: detachLabel
      summary: Detach a label from an operation
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { name: label_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/Fleet" }
      responses:
        "204": { description: Detached }

  /v1/operations/{id}/pull-requests:
    post:
      tags: [ui]
      operationId: addPullRequest
      summary: Link a pull request to an operation (manual)
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }, { $ref: "#/components/parameters/Fleet" }]
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [url], properties: { url: { type: string }, title: { type: string }, number: { type: integer } } } } }
      responses:
        "201":
          description: Linked
          content: { application/json: { schema: { $ref: "#/components/schemas/PullRequest" } } }

  /v1/pull-requests/{id}:
    delete:
      tags: [ui]
      operationId: deletePullRequest
      summary: Unlink a pull request
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }, { $ref: "#/components/parameters/Fleet" }]
      responses:
        "204": { description: Unlinked }

  /v1/operations/{id}/relations:
    post:
      tags: [ui]
      operationId: addRelation
      summary: Link this operation to another (blocks / blocked_by / relates / duplicate / duplicated_by)
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }, { $ref: "#/components/parameters/Fleet" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind, target]
              properties:
                kind: { type: string, enum: [blocks, blocked_by, relates, duplicate, duplicated_by] }
                target: { type: string, format: uuid, description: other operation public id }
      responses:
        "204": { description: Linked }

  /v1/relations/{id}:
    delete:
      tags: [ui]
      operationId: deleteRelation
      summary: Remove an operation relationship
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }, { $ref: "#/components/parameters/Fleet" }]
      responses:
        "204": { description: Removed }

  /v1/operations/search:
    get:
      tags: [ui]
      operationId: searchOperations
      summary: Typeahead search for operations (link picker)
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: "#/components/parameters/Fleet" }
        - { name: q, in: query, schema: { type: string }, description: title substring or numeric sequence }
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/OperationReference" } } } }

  /v1/labels:
    get:
      tags: [ui]
      operationId: listLabels
      summary: Labels in the fleet
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Fleet" }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Label" } } } } }
    post:
      tags: [ui]
      operationId: createLabel
      summary: Create a label
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Fleet" }]
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [name], properties: { name: { type: string }, color: { type: string } } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Label" } } } }
        "409": { $ref: "#/components/responses/Conflict" }

  /v1/labels/{id}:
    delete:
      tags: [ui]
      operationId: deleteLabel
      summary: Delete a label
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }, { $ref: "#/components/parameters/Fleet" }]
      responses:
        "204": { description: Deleted }

  /v1/operations/{id}/reactions/{emoji}:
    put:
      tags: [ui]
      operationId: addOperationReaction
      summary: Add the caller's emoji reaction to an operation
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { name: emoji, in: path, required: true, schema: { type: string } }
        - { $ref: "#/components/parameters/Fleet" }
      responses:
        "204": { description: Added }
    delete:
      tags: [ui]
      operationId: removeOperationReaction
      summary: Remove the caller's emoji reaction from an operation
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { name: emoji, in: path, required: true, schema: { type: string } }
        - { $ref: "#/components/parameters/Fleet" }
      responses:
        "204": { description: Removed }

  /v1/comments/{id}/reactions/{emoji}:
    put:
      tags: [ui]
      operationId: addReaction
      summary: Add the caller's emoji reaction to a comment
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { name: emoji, in: path, required: true, schema: { type: string } }
        - { $ref: "#/components/parameters/Fleet" }
      responses:
        "204": { description: Added }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [ui]
      operationId: removeReaction
      summary: Remove the caller's emoji reaction from a comment
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { name: emoji, in: path, required: true, schema: { type: string } }
        - { $ref: "#/components/parameters/Fleet" }
      responses:
        "204": { description: Removed }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/operations/{id}/comments:
    get:
      tags: [ui]
      operationId: listComments
      summary: List an operation's comment thread
      security: [{ sessionCookie: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/Fleet" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Comment" } }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [ui]
      operationId: postComment
      summary: Post a comment on an operation
      security: [{ sessionCookie: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/Fleet" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostCommentRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Comment" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/pilots:
    get:
      tags: [ui]
      operationId: listPilots
      summary: Pilot kinds and how many fleet rovers each can drive
      description: >
        A pilot is a local AI CLI that drives a rover. Returns one
        entry per kind with how many of the fleet's rovers it can drive and whether
        any is online; drives the assign picker.
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Fleet" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Pilot" } }

  /v1/crews:
    get:
      tags: [ui]
      operationId: listCrews
      summary: List crews (teams of pilots + humans) with members
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Fleet" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Crew" } }
    post:
      tags: [ui]
      operationId: createCrew
      summary: Create a crew (owner/admin only)
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Fleet" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCrewRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Crew" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/crews/{id}:
    patch:
      tags: [ui]
      operationId: patchCrew
      summary: Rename a crew (owner/admin only)
      security: [{ sessionCookie: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/Fleet" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 1 }
      responses:
        "204": { description: Updated }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [ui]
      operationId: deleteCrew
      summary: Delete a crew (owner/admin only)
      security: [{ sessionCookie: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/Fleet" }
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/crews/{id}/members/{member_type}/{member_id}:
    put:
      tags: [ui]
      operationId: addCrewMember
      summary: Add (or update the role of) a crew member (owner/admin only)
      security: [{ sessionCookie: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: member_type, in: path, required: true, schema: { type: string, enum: [pilot, user] } }
        - { name: member_id, in: path, required: true, schema: { type: string }, description: "user public id, or pilot kind" }
        - { $ref: "#/components/parameters/Fleet" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CrewMemberRequest" }
      responses:
        "204": { description: Added }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [ui]
      operationId: removeCrewMember
      summary: Remove a crew member (owner/admin only)
      security: [{ sessionCookie: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: member_type, in: path, required: true, schema: { type: string, enum: [pilot, user] } }
        - { name: member_id, in: path, required: true, schema: { type: string }, description: "user public id, or pilot kind" }
        - { $ref: "#/components/parameters/Fleet" }
      responses:
        "204": { description: Removed }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/runs:
    get:
      tags: [ui]
      operationId: listRuns
      summary: List runs in the fleet
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Fleet" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Run" } }

  /v1/runs/{id}:
    get:
      tags: [ui]
      operationId: getRun
      summary: A run with its events and artifacts
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { $ref: "#/components/parameters/Fleet" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunDetail" }
        "404": { $ref: "#/components/responses/NotFound" }
  /v1/runs/{id}/cancel:
    post:
      tags: [ui]
      operationId: cancelRun
      summary: Cancel an active run
      security: [{ sessionCookie: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { $ref: "#/components/parameters/Fleet" }
      responses:
        "200":
          description: Canceled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Run" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /v1/missions:
    get:
      tags: [ui]
      operationId: listMissions
      summary: List missions (fleet-scoped operation groupings)
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Fleet" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Mission" } }
    post:
      tags: [ui]
      operationId: createMission
      summary: Create a mission with a key used to prefix operation codes
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Fleet" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMissionRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mission" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }

  /v1/missions/counts:
    get:
      tags: [ui]
      operationId: missionCounts
      summary: Per-mission operation counts (keyed by mission id)
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Fleet" }]
      responses:
        "200":
          description: mission id → count
          content:
            application/json:
              schema: { type: object, additionalProperties: { type: integer, format: int64 } }

  /v1/missions/{id}:
    patch:
      tags: [ui]
      operationId: updateMission
      summary: Rename a mission and/or its key
      security: [{ sessionCookie: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/Fleet" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMissionRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mission" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /v1/signals:
    get:
      tags: [ui]
      operationId: listSignals
      summary: The current user's (non-archived) signals in the fleet
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Fleet" }]
      responses:
        "200":
          description: OK (unread first, newest first)
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Signal" } }

  /v1/signals/{id}:
    patch:
      tags: [ui]
      operationId: patchSignal
      summary: Mark a signal read or archive it
      security: [{ sessionCookie: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/Fleet" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                read: { type: boolean }
                archived: { type: boolean }
      responses:
        "204":
          description: Updated

  /v1/ws:
    get:
      tags: [ui]
      operationId: ws
      summary: WebSocket stream of typed change events for the fleet
      description: >
        WebSocket upgrade (cookie-authed, fleet membership checked). The server
        pushes typed JSON frames `{"t":"operation"|"run"|"run_message"|"comment"|
        "signal"|"rover"}` whenever that slice changes in the fleet, so the client
        revalidates only the affected data. Auto-reconnect + resync is the
        client's responsibility. (Sourced from PostgreSQL LISTEN/NOTIFY, so it works
        across API instances.)
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Fleet" }]
      responses:
        "101": { description: Switching Protocols (WebSocket) }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/members:
    get:
      tags: [ui]
      operationId: listMembers
      summary: Human members of the fleet
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Fleet" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Member" } }

  /v1/members/{id}:
    patch:
      tags: [ui]
      operationId: updateMemberRole
      summary: Change a member's role (owner only)
      security: [{ sessionCookie: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/Fleet" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties: { role: { type: string, enum: [owner, admin, member] } }
      responses:
        "204": { description: Updated }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [ui]
      operationId: removeMember
      summary: Remove a member from the fleet (owner/admin only; cannot remove an owner)
      security: [{ sessionCookie: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/Fleet" }
      responses:
        "204": { description: Removed }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/invitations:
    get:
      tags: [ui]
      operationId: listInvitations
      summary: Pending invitations for the fleet (owner/admin only)
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Fleet" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Invitation" } }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [ui]
      operationId: createInvitation
      summary: Invite a teammate by email (owner/admin only)
      description: >
        Matched on the email the invitee registers with; no email is sent.
        409 if the email is already a member or already has a pending invitation.
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Fleet" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
                role: { type: string, enum: [admin, member], default: member }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Invitation" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { description: Already a member or already invited }

  /v1/invitations/mine:
    get:
      tags: [ui]
      operationId: myInvitations
      summary: Pending invitations addressed to the signed-in user
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/MyInvite" } }

  /v1/invitations/{id}:
    delete:
      tags: [ui]
      operationId: revokeInvitation
      summary: Revoke a pending invitation (owner/admin only)
      security: [{ sessionCookie: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/Fleet" }
      responses:
        "204": { description: Revoked }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/invitations/{id}/accept:
    post:
      tags: [ui]
      operationId: acceptInvitation
      summary: Accept an invitation addressed to the signed-in user
      description: Verifies the email matches, the invitation is pending and not expired, then joins the fleet.
      security: [{ sessionCookie: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Joined
          content:
            application/json:
              schema:
                type: object
                properties: { fleet_id: { type: string, format: uuid } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "410": { description: Invitation expired }

  /v1/invitations/{id}/decline:
    post:
      tags: [ui]
      operationId: declineInvitation
      summary: Decline an invitation addressed to the signed-in user
      security: [{ sessionCookie: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Declined }

  /v1/rover/me:
    patch:
      tags: [rover]
      operationId: refreshRover
      summary: Refresh the rover's self-reported metadata and auto-tags
      security: [{ roverConnectionToken: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                units: { type: integer, minimum: 1 }
                auto_tags: { type: array, items: { type: string } }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                required: [name]
                properties:
                  name: { type: string }
    delete:
      tags: [rover]
      operationId: removeRoverEnrollment
      summary: Remove the calling rover enrollment (connection-token auth; used by `rover remove`)
      security: [{ roverConnectionToken: [] }]
      responses:
        "204": { description: Enrollment removed }

  /v1/rover/runs/claim:
    post:
      tags: [rover]
      operationId: claimRun
      summary: Long-poll claim the oldest queued run in the rover's fleet
      security: [{ roverConnectionToken: [] }]
      responses:
        "200":
          description: A run was claimed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClaimedRun" }
        "204": { description: No queued runs before the long-poll deadline }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/rover/runs/{id}:
    patch:
      tags: [rover]
      operationId: setRunState
      summary: Set a run's state
      security: [{ roverConnectionToken: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetStateRequest" }
      responses:
        "200":
          description: Updated run
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Run" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/rover/runs/{id}/heartbeat:
    put:
      tags: [rover]
      operationId: heartbeat
      summary: Renew a run's lease
      security: [{ roverConnectionToken: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "204": { description: Lease renewed }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/rover/runs/{id}/events:
    post:
      tags: [rover]
      operationId: appendRunEvent
      summary: Append an event to a run's timeline
      security: [{ roverConnectionToken: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AppendEventRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunEvent" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/rover/runs/{id}/artifacts:
    post:
      tags: [rover]
      operationId: appendArtifact
      summary: Attach an artifact (e.g. a git diff) to a run
      security: [{ roverConnectionToken: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AppendArtifactRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Artifact" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/rover/runs/{id}/messages:
    post:
      tags: [rover]
      operationId: appendRunMessage
      summary: Append a typed transcript message (pilot telemetry) to a run
      security: [{ roverConnectionToken: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RunMessageRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunMessage" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/rover/runs/{id}/result:
    post:
      tags: [rover]
      operationId: runResult
      summary: Record the pilot session + post its final message as a comment
      description: >
        Stores the resumable session id on the run and its operation (so a human
        reply resumes it) and, if message is non-empty, posts it as a pilot
        comment on the operation.
      security: [{ roverConnectionToken: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RunResultRequest" }
      responses:
        "204": { description: Recorded }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: ufo_session
    enrollmentCode:
      type: http
      scheme: bearer
      description: Enrollment code from the Rovers panel; exchanged once for a connection token.
    roverConnectionToken:
      type: http
      scheme: bearer
      description: Per-rover connection token returned by enrollment.

  parameters:
    Id:
      name: id
      in: path
      required: true
      description: Public resource id.
      schema: { type: string, format: uuid }
    Fleet:
      name: fleet
      in: query
      required: true
      description: Active fleet id (membership enforced).
      schema: { type: string, format: uuid }

  responses:
    BadRequest:
      description: Bad request
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Unauthorized:
      description: Not authenticated
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Forbidden:
      description: Not a member of the fleet
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    NotFound:
      description: Not found
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Conflict:
      description: Already exists
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  schemas:
    Error:
      type: object
      properties: { error: { type: string } }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        name: { type: string }

    Fleet:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        kind: { type: string, enum: [personal, group], description: personal fleets can't be invited to/deleted }

    Rover:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        status: { type: string, enum: [online, busy, offline] }
        units: { type: integer, minimum: 1, description: concurrent operations this rover can process }
        busy_units: { type: integer, minimum: 0, description: active operations currently claimed by this rover }
        tags: { type: array, items: { type: string }, description: user-set dispatch tags }
        auto_tags: { type: array, items: { type: string }, description: "rover-detected (pilot:*, os:*, arch:*)" }
        created_at: { type: string, format: date-time }
        last_seen_at: { type: string, format: date-time }

    EnrollmentCode:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        name: { type: string }
        remaining_uses: { type: integer, minimum: 1, maximum: 1000 }
        created_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time, nullable: true }

    CreateEnrollmentCodeRequest:
      type: object
      properties:
        name:
          type: string
          description: Required when uses > 1.
        uses:
          type: integer
          minimum: 1
          maximum: 1000
          default: 1
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Optional; must be ≤ 1 year out.

    EnrollRequest:
      type: object
      properties:
        name: { type: string, description: Rover name (defaults to hostname) }
        tags: { type: array, items: { type: string }, description: user dispatch tags }
        auto_tags: { type: array, items: { type: string }, description: rover-detected tags }

    EnrollResponse:
      type: object
      properties:
        token: { type: string, description: The per-rover connection token }
        id: { type: string, format: uuid }
        name: { type: string }

    Operation:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        body: { type: string }
        status: { type: string, enum: [backlog, todo, in_progress, in_review, done, blocked, cancelled] }
        active_run_state: { type: string, enum: ["", queued, claimed, starting, running], description: "Current in-flight run state, empty when none" }
        mission_id: { type: string, format: uuid, description: The mission this operation belongs to (required) }
        sequence: { type: integer, description: Per-mission running number; displayed as <mission.key>-<sequence> }
        priority: { type: integer, description: 0 none → 4 urgent }
        assignee_type: { type: string, enum: [pilot, user, crew], nullable: true }
        assignee_id: { type: string, format: uuid, nullable: true, description: Referenced user/crew public id (null when assignee is a pilot) }
        assignee_pilot_kind: { type: string, nullable: true, description: Pilot kind when assignee_type=pilot (e.g. codex) }
        required_tags: { type: array, items: { type: string }, description: dispatch allow list (rover must have all) }
        excluded_tags: { type: array, items: { type: string }, description: dispatch deny list (rover must have none; deny wins) }
        labels: { type: array, items: { $ref: "#/components/schemas/Label" } }
        reactions: { type: array, items: { $ref: "#/components/schemas/Reaction" }, description: only populated in the detail view }
        sub_operation_progress: { type: object, properties: { total: { type: integer }, done: { type: integer } }, description: sub-operation progress }
        start_date: { type: string, format: date, nullable: true, description: Planning start date }
        due_date: { type: string, format: date, nullable: true, description: Planning due date }
        main_operation_id: { type: string, format: uuid, nullable: true }
        orchestrating: { type: boolean, description: captain split this operation into sub-operations and will reconvene to reconcile them }
        archived: { type: boolean }
        started_at: { type: string, format: date-time, nullable: true, description: Lifecycle timestamp set when work starts }
        finished_at: { type: string, format: date-time, nullable: true, description: Lifecycle timestamp set when work reaches done/cancelled }
        created_by: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Label:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        color: { type: string }

    PullRequest:
      type: object
      properties:
        id: { type: string, format: uuid }
        url: { type: string }
        title: { type: string }
        state: { type: string }
        number: { type: integer, nullable: true }

    OperationReference:
      type: object
      description: Compact operation reference (relations, search) — enough to render a code and status.
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        status: { type: string }
        sequence: { type: integer }
        mission_id: { type: string, format: uuid }

    Relation:
      type: object
      description: A directed link to another operation, shown from this operation's side.
      properties:
        id: { type: string, format: uuid }
        kind: { type: string, enum: [blocks, blocked_by, relates, duplicate, duplicated_by] }
        operation: { $ref: "#/components/schemas/OperationReference" }

    Pilot:
      type: object
      description: A pilot kind with the fleet rovers it can drive, and availability.
      properties:
        kind: { type: string, pattern: "^[a-z][a-z0-9_-]{0,31}$" }
        rovers: { type: integer, description: rovers in the fleet this pilot can drive }
        online: { type: boolean, description: at least one of those rovers is online }

    Crew:
      type: object
      description: A team of pilots and/or humans an operation can be assigned to.
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        members: { type: array, items: { $ref: "#/components/schemas/CrewMember" } }

    CrewMember:
      type: object
      properties:
        member_type: { type: string, enum: [pilot, user] }
        member_id: { type: string, description: "user public id, or pilot kind when member_type=pilot" }
        role: { type: string, enum: [captain, member] }

    Member:
      type: object
      description: A human member of the fleet.
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string }
        role: { type: string, enum: [owner, admin, member] }

    Invitation:
      type: object
      description: A pending invitation to join the fleet (matched by email; no email is sent).
      properties:
        id: { type: string, format: uuid }
        invitee_email: { type: string, format: email }
        role: { type: string, enum: [admin, member] }
        status: { type: string, enum: [pending, accepted, declined, expired] }
        expires_at: { type: string, format: date-time }

    MyInvite:
      type: object
      description: An invitation addressed to the signed-in user, with the inviting fleet's name.
      properties:
        id: { type: string, format: uuid }
        fleet_id: { type: string, format: uuid }
        fleet_name: { type: string }
        role: { type: string, enum: [admin, member] }
        invitee_email: { type: string, format: email }

    Comment:
      type: object
      properties:
        id: { type: string, format: uuid }
        author_type: { type: string, enum: [user, pilot, system] }
        author_id: { type: string, format: uuid, nullable: true, description: user public id (null when author is a pilot/system) }
        author_pilot_kind: { type: string, nullable: true, description: pilot kind when author_type=pilot }
        body: { type: string }
        reactions: { type: array, items: { $ref: "#/components/schemas/Reaction" } }
        created_at: { type: string, format: date-time }

    Reaction:
      type: object
      properties:
        emoji: { type: string }
        count: { type: integer }
        mine: { type: boolean }
        users: { type: array, items: { type: string }, description: reactors oldest-first (hover tooltip) }

    Signal:
      type: object
      description: An action signal for a human (e.g. a pilot delivered work to review).
      properties:
        id: { type: string, format: uuid }
        operation_id: { type: string, format: uuid, nullable: true }
        type: { type: string, example: review_requested, description: "e.g. review_requested, input_requested, task_failed" }
        severity: { type: string, enum: [action_required, attention, info] }
        title: { type: string }
        body: { type: string }
        read: { type: boolean }
        created_at: { type: string, format: date-time }

    Mission:
      type: object
      description: A grouping of operations within a fleet, with a fleet-unique operation-prefix key.
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        key: { type: string, description: Operation prefix (e.g. MSJ -> MSJ-123); unique within the fleet }

    CreateMissionRequest:
      type: object
      required: [name, key]
      properties:
        name: { type: string }
        key: { type: string, description: Operation prefix (alphanumeric; unique within the fleet) }

    Run:
      type: object
      properties:
        id: { type: string, format: uuid }
        operation_id: { type: string, format: uuid }
        pilot: { type: string, pattern: "^[a-z][a-z0-9_-]{0,31}$" }
        state:
          type: string
          enum: [queued, claimed, starting, running, blocked, succeeded, failed, canceled]
        needs_input: { type: boolean, description: pilot ended this run awaiting a human answer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    RunEvent:
      type: object
      description: Events are ordered by insertion.
      properties:
        kind: { type: string }
        message: { type: string }
        created_at: { type: string, format: date-time }

    Artifact:
      type: object
      properties:
        kind: { type: string, example: diff }
        name: { type: string, example: git.diff }
        content: { type: string }
        created_at: { type: string, format: date-time }

    OperationDetail:
      type: object
      properties:
        operation: { $ref: "#/components/schemas/Operation" }
        comments: { type: array, items: { $ref: "#/components/schemas/Comment" } }
        runs: { type: array, items: { $ref: "#/components/schemas/Run" } }
        sub_operations: { type: array, items: { $ref: "#/components/schemas/Operation" } }
        pull_requests: { type: array, items: { $ref: "#/components/schemas/PullRequest" } }
        relations: { type: array, items: { $ref: "#/components/schemas/Relation" } }

    RunDetail:
      type: object
      properties:
        run: { $ref: "#/components/schemas/Run" }
        events: { type: array, items: { $ref: "#/components/schemas/RunEvent" } }
        artifacts: { type: array, items: { $ref: "#/components/schemas/Artifact" } }
        messages: { type: array, items: { $ref: "#/components/schemas/RunMessage" } }

    RunMessage:
      type: object
      description: One typed transcript entry (pilot telemetry) for a run.
      properties:
        sequence: { type: integer }
        type: { type: string, enum: [text, thinking, tool_use, tool_result, error] }
        tool: { type: string }
        content: { type: string }
        input: { type: object, additionalProperties: true, nullable: true }
        output: { type: string }
        created_at: { type: string, format: date-time }

    RunMessageRequest:
      type: object
      required: [sequence, type]
      properties:
        sequence: { type: integer }
        type: { type: string, enum: [text, thinking, tool_use, tool_result, error] }
        tool: { type: string }
        content: { type: string }
        input: { type: object, additionalProperties: true }
        output: { type: string }

    ClaimedRun:
      type: object
      description: Rover-facing view of a claimed run.
      properties:
        id: { type: string, format: uuid }
        operation_id: { type: string, format: uuid }
        state: { type: string }
        pilot: { type: string, pattern: "^[a-z][a-z0-9_-]{0,31}$" }
        command: { type: string, description: "Resume prompt carried to the pilot, if any" }
        prompt: { type: string, description: First run = operation title+body; resume run = the human reply }
        session_id: { type: string, description: Non-empty → resume this pilot session }
        can_propose_sub_operations: { type: boolean, description: captain may propose sub-operations (top-level crew operation only) }

    SignupRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string, minLength: 8 }
        name: { type: string }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }

    CreateOperationRequest:
      type: object
      required: [title, mission_id]
      properties:
        title: { type: string }
        body: { type: string, description: The operation's prompt for the assigned pilot }
        mission_id: { type: string, format: uuid, description: Required — every operation belongs to a mission }
        assignee_type: { type: string, enum: [pilot, user, crew], nullable: true }
        assignee_id: { type: string, nullable: true, description: "user/crew public id, or pilot kind when assignee_type=pilot" }
        required_tags: { type: array, items: { type: string } }
        excluded_tags: { type: array, items: { type: string } }
        priority: { type: integer, minimum: 0, maximum: 4 }
        main_operation_id: { type: string, format: uuid, nullable: true }
        start_date: { type: string, format: date, nullable: true }
        due_date: { type: string, format: date, nullable: true }

    OperationPatch:
      type: object
      properties:
        assignee_type: { type: string, enum: [pilot, user, crew], nullable: true }
        assignee_id: { type: string, nullable: true, description: "user/crew public id, or pilot kind when assignee_type=pilot" }
        status: { type: string, enum: [backlog, todo, in_progress, in_review, done, blocked, cancelled] }
        required_tags: { type: array, items: { type: string } }
        excluded_tags: { type: array, items: { type: string } }
        priority: { type: integer, minimum: 0, maximum: 4 }
        start_date: { type: string, format: date, nullable: true }
        due_date: { type: string, format: date, nullable: true }
        main_operation_id: { type: string, format: uuid, nullable: true }
        archived: { type: boolean }

    PostCommentRequest:
      type: object
      required: [body]
      properties:
        body: { type: string }

    CreateCrewRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }

    CrewMemberRequest:
      type: object
      properties:
        role: { type: string, enum: [captain, member], default: member }

    SetStateRequest:
      type: object
      required: [state]
      properties:
        state:
          type: string
          enum: [starting, running, blocked, succeeded, failed, canceled]

    AppendEventRequest:
      type: object
      properties:
        kind: { type: string, default: log }
        message: { type: string }

    AppendArtifactRequest:
      type: object
      properties:
        kind: { type: string, default: artifact, example: diff }
        name: { type: string, example: git.diff }
        content: { type: string }

    RunResultRequest:
      type: object
      properties:
        session_id: { type: string, description: The pilot session id to persist for resume }
        message: { type: string, description: The pilot's final message; posted as a pilot comment if non-empty }
        needs_input: { type: boolean, description: pilot is awaiting a human answer to continue (→ input_requested signal) }
        operation_status: { type: string, description: pilot-requested operation status (overrides the default success→in_review / fail→blocked mapping) }
        sub_operations: { type: array, description: "captain's split into parallel sub-operations (top-level crew operation only; capped at 8)", items: { type: object, required: [title], properties: { title: { type: string }, body: { type: string }, assignee: { type: string, description: optional crew-member pilot kind; default = the crew } } } }
