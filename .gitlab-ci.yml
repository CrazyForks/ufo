stages:
  - check

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop")
    - when: never

"API (Go)":
  stage: check
  image: golang:1.26-alpine
  services:
    - name: postgres:18
      alias: postgres
  variables:
    POSTGRES_USER: ufo
    POSTGRES_PASSWORD: ufo
    POSTGRES_DB: ufo
    UFO_HUB_TEST_DATABASE_URL: postgres://ufo:ufo@postgres:5432/ufo?sslmode=disable
  before_script:
    - apk add --no-cache postgresql-client
    - until pg_isready -h postgres -U ufo -d ufo; do sleep 1; done
  script:
    - cd apps/api
    - go build ./...
    - go vet ./...
    - go test ./...

"Web (Next.js)":
  stage: check
  image: node:26-alpine
  script:
    - cd apps/web
    - npm ci
    - npm run lint
    - npm run build

"Rover (Rust)":
  stage: check
  image: rust:latest
  before_script:
    - rustup component add rustfmt clippy
  script:
    - cd apps/rover
    - cargo fmt --check
    - cargo clippy -- -D warnings
    - cargo test
    - cargo build

"OpenAPI":
  stage: check
  image: node:26-alpine
  script:
    - npx --yes @redocly/cli@2.34.0 lint apps/api/internal/spec/openapi.yaml
